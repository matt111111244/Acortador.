<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATEODEV AI V25 - FIX</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #0a0a0a;
            --ai-blue: #00d4ff;
        }
        body { 
            background: var(--dark-bg); 
            color: var(--neon-green); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }
        .header { 
            background: #111; 
            padding: 12px; 
            text-align: center; 
            border-bottom: 1px solid var(--neon-green); 
            font-size: 12px;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
        }
        .msg { 
            padding: 12px 16px; 
            border-radius: 10px; 
            max-width: 85%; 
            font-size: 15px; 
            line-height: 1.4;
        }
        .user { 
            align-self: flex-end; 
            background: #003300; 
            border: 1px solid var(--neon-green); 
            color: #fff;
        }
        .ai { 
            align-self: flex-start; 
            background: #001a33; 
            border: 1px solid var(--ai-blue); 
            color: #e0e0e0; 
        }
        .input-box { 
            display: flex; 
            padding: 15px; 
            background: #111; 
            border-top: 1px solid #333; 
        }
        input { 
            flex: 1; 
            background: #000; 
            border: 1px solid var(--neon-green); 
            color: var(--neon-green); 
            padding: 14px; 
            outline: none; 
            border-radius: 5px; 
        }
        button { 
            background: var(--neon-green); 
            border: none; 
            padding: 0 20px; 
            font-weight: bold; 
            margin-left: 10px; 
            border-radius: 5px; 
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">⚡ MATEODEV AI V25 - REPARADO</div>
    <div id="chat">
        <div class="msg ai">Sistemas reparados, Mateo. ¿Qué tarea ejecutamos hoy?</div>
    </div>
    <div class="input-box">
        <input type="text" id="minput" placeholder="Comando..." autocomplete="off">
        <button onclick="enviar()">EJECUTAR</button>
    </div>

    <script>
        // Asegúrate de que esta KEY sea válida en OpenRouter
        const KEY = "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";
        
        // Modelos actualizados (IDs correctos para OpenRouter)
        const modelos = [
            "google/gemini-2.0-flash-lite-preview-02-05:free",
            "google/gemini-flash-1.5-8b",
            "mistralai/mistral-7b-instruct:free",
            "deepseek/deepseek-chat"
        ];

        async function enviar() {
            const input = document.getElementById('minput');
            const val = input.value.trim();
            if(!val) return;

            add(val, 'user');
            input.value = "";
            const load = add("Conectando con red neuronal...", 'ai');

            for (let m of modelos) {
                try {
                    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${KEY}`,
                            "HTTP-Referer": "http://localhost", 
                            "X-Title": "MateoDev"
                        },
                        body: JSON.stringify({
                            "model": m,
                            "messages": [
                                { "role": "system", "content": "Eres MateoDev AI. Eres un experto programador y asistente inteligente. Responde de forma clara." },
                                { "role": "user", "content": val }
                            ]
                        })
                    });
                    
                    if (!res.ok) throw new Error("Status: " + res.status);

                    const data = await res.json();
                    if (data.choices && data.choices[0]) {
                        load.remove();
                        add(data.choices[0].message.content + "\n\naca esta creador mateo", 'ai');
                        return;
                    }
                } catch (e) { 
                    console.error("Fallo en: " + m, e); 
                }
            }
            load.innerText = "❌ ERROR: Revisa tu API Key o conexión.";
        }

        function add(t, c) {
            const d = document.createElement('div');
            d.className = "msg " + c;
            d.innerText = t;
            const chat = document.getElementById('chat');
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
            return d;
        }

        document.getElementById('minput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviar();
        });
    </script>
</body>
</html>
